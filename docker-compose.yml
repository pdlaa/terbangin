version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: terbangin_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: db_maskapai
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: terbangin_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:root@db:3306/db_maskapai
      NEXT_PUBLIC_APP_URL: http://localhost
      API_URL: http://localhost/api
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: terbangin_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  db_data:
